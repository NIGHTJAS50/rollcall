
services:
  - type: web
    name: rollcall
    env: node
    region: oregon
    plan: free
    buildCommand: cd rollcall && npm install && npx prisma generate && npm run build && cp -r public .next/standalone/public && cp -r .next/static .next/standalone/.next/static
    startCommand: cd rollcall && npx prisma migrate deploy && HOSTNAME=0.0.0.0 node .next/standalone/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rollcall-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false        # Set this manually in Render dashboard after deploy
      - key: NODE_VERSION
        value: "20"

databases:
  - name: rollcall-db
    plan: free
    databaseName: rollcall
    user: rollcall_user
